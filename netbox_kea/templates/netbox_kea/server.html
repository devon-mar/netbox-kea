{% extends "generic/object.html" %}

{% block content %}
  <div class="row mb-3">
    <div class="col col-md-6">
      <div class="card">
        <h5 class="card-header">Server</h5>
        <div class="card-body">
          <table class="table table-hover attr-table">
            <tr>
              <th scope="row">Name</th>
              <td>{{ object.name }}</td>
            </tr>
            <tr>
              <th scope="row">DHCPv6 Server URL</th>
              <td>{{ object.dhcp6_url }}</td>
            </tr>
            <tr>
              <th scope="row">DHCPv4 Server URL</th>
              <td>{{ object.dhcp4_url }}</td>
            </tr>
          </table>
        </div>
      </div>
    </div>
    <div class="col col-md-6">
      {% include "inc/panels/tags.html" %}
    </div>
  </div>
{% endblock content %}
